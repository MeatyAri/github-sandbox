name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3 python3-pip python3-requests ffmpeg curl pigz zstd
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o /usr/local/bin/yt-dlp
          chmod +x /usr/local/bin/yt-dlp
          curl -sL https://github.com/amirrezaDev1378/ollama-model-direct-download/releases/download/v2.1.1/omdd-linux-amd64 -o /usr/local/bin/omdd
          chmod +x /usr/local/bin/omdd

      - name: Install bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "BUN_INSTALL_DIR=$HOME/.bun" >> $GITHUB_ENV

      - name: Setup YouTube cookies
        if: success()
        run: |
          echo '${{ secrets.YOUTUBE_COOKIES }}' > youtube_cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Setup Twitch cookies
        if: success()
        run: |
          echo '${{ secrets.TWITCH_COOKIES }}' > twitch_cookies.txt
        env:
          TWITCH_COOKIES: ${{ secrets.TWITCH_COOKIES }}

      - name: Setup Reddit cookies
        if: success()
        run: |
          echo '${{ secrets.REDDIT_COOKIES }}' > reddit_cookies.txt
        env:
          REDDIT_COOKIES: ${{ secrets.REDDIT_COOKIES }}

      - name: Setup SoundCloud cookies
        if: success()
        run: |
          echo '${{ secrets.SOUNDCLOUD_COOKIES }}' > soundcloud_cookies.txt
        env:
          SOUNDCLOUD_COOKIES: ${{ secrets.SOUNDCLOUD_COOKIES }}

      - name: Install cpx
        run: |
          curl -fsSL https://raw.githubusercontent.com/11happy/cpx/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup scripts
        run: |
          mkdir -p scripts
          cpx '${{ github.server_url }}/${{ github.repository }}/scripts/*' scripts/ || true

      - name: Extract URLs and download files
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          DO_ARCHIVE=0
          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
            DO_ARCHIVE=1
          elif echo "$MSG" | grep -qP 'ollama:'; then
            MODE="ollama"
            OLLAMA_MODEL=$(echo "$MSG" | grep -oP 'ollama:\s*\K.*')
            DO_ARCHIVE=1
          elif echo "$MSG" | grep -qP 'download:'; then
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
            URL_COUNT=$(echo "$URL_LINE" | wc -w)
            if [ "$URL_COUNT" -gt 1 ]; then
              MODE="zip"
              echo "  download: multi-file → upgrade to zip mode"
              DO_ARCHIVE=1
            else
              MODE="normal"
              DO_ARCHIVE=0
              echo "  download: single file mode, no archive"
            fi
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          echo "Archive: $DO_ARCHIVE"
          echo "$DO_ARCHIVE" > /tmp/do_archive.txt
          mkdir -p downloads tmp_downloads

          if [ "$MODE" = "ollama" ]; then
            echo "Getting Ollama direct links: $OLLAMA_MODEL"
            omdd get $OLLAMA_MODEL > /tmp/ollama_output.txt
            python3 scripts/extract_ollama_links.py /tmp/ollama_output.txt > /tmp/ollama_links.txt
            echo "=== DEBUG: Links file contents ==="
            cat /tmp/ollama_links.txt
            echo "=== DEBUG: Line count ==="
            wc -l /tmp/ollama_links.txt

            while IFS= read -r LINE || [ -n "$LINE" ]; do
              echo "DEBUG: Read line: [$LINE]"
              URL=$(echo "$LINE" | grep -oP 'https://\S+' | head -1)
              [[ -z "$URL" ]] && { echo "Skipping - no URL found"; continue; }
              FILENAME=$(basename "$URL")
              echo "Downloading: $URL -> $FILENAME"
              aria2c \
                --console-log-level=notice \
                --summary-interval=2 \
                --dir="tmp_downloads" \
                --out "$FILENAME" \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --header="Accept: application/vnd.docker.distribution.manifest.v2+json" \
                "$URL"
              EXIT_CODE=$?
              if [ $EXIT_CODE -ne 0 ]; then
                echo "aria2c failed with code $EXIT_CODE"
                ls -la tmp_downloads/
                exit 1
              fi
            done < /tmp/ollama_links.txt
            ls -la tmp_downloads/

            cpx tmp_downloads/* downloads/
          else
          for URL in $URL_LINE; do
            echo "Processing: $URL"

            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Resolving Bunkr URL:"
              BUNKR_URL=$(python3 scripts/bunkr.py "$URL")
              [[ -z "$BUNKR_URL" ]] && { echo "ERROR: Failed to resolve bunkr URL"; exit 1; }
              echo "Downloading with aria2: $BUNKR_URL"
              aria2c \
                --split=8 \
                --max-connection-per-server=8 \
                --min-split-size=5M \
                --dir="tmp_downloads" \
                --out "$(basename "$BUNKR_URL")" \
                "$BUNKR_URL"

            elif echo "$URL" | grep -qE "youtube\.com|youtu\.be"; then
              echo "Downloading YouTube: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies youtube_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "twitch\.tv"; then
              echo "Downloading Twitch: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies twitch_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "reddit\.com"; then
              echo "Downloading Reddit: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies reddit_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "soundcloud"; then
              echo "Downloading SoundCloud: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies soundcloud_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "pexels"; then
              echo "Downloading Pexels: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "podcasts\.apple\.com"; then
              echo "Downloading Apple Podcasts: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "rumble\.com|odysee\.com|bitchute\.com|bandcamp\.com"; then
              echo "Downloading video platform: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            else
              echo "Downloading with aria2: $URL"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --summary-interval=2 \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done
          fi

          FILE_COUNT=$(find tmp_downloads -type f 2>/dev/null | wc -l)
          echo "Downloaded $FILE_COUNT files to tmp_downloads"
          if [ "$FILE_COUNT" -eq 0 ] && [ "$MODE" != "zip" ] && [ "$MODE" != "ollama" ]; then
            echo "ERROR: No files downloaded"
            ls -la tmp_downloads/
            exit 1
          fi

          cpx tmp_downloads/* downloads/ 2>/dev/null || true
          rm -rf tmp_downloads

      - name: Create archive
        run: |
          DO_ARCHIVE=$(cat /tmp/do_archive.txt 2>/dev/null || echo 0)
          cd downloads
          FILE_COUNT=$(find . -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files to archive"
            exit 0
          fi
          if [ "$DO_ARCHIVE" -ne 1 ]; then
            echo "Single file mode - keeping files as-is, no archive"
            echo "0" > /tmp/archive_size.txt
            exit 0
          fi

          ARCHIVE_NAME="/tmp/archive_$(date +%Y%m%d_%H%M%S).tar.gz"
          tar -cvf - . | pigz -k > "$ARCHIVE_NAME"

          SIZE=$(stat -c%s "$ARCHIVE_NAME")
          echo "$SIZE" > "/tmp/archive_size.txt"
          rm -f ./*
          mv "$ARCHIVE_NAME" .
          echo "Archive created: $(basename "$ARCHIVE_NAME") ($(( SIZE / 1024 / 1024 ))MB)"

      - name: Split large files
        run: |
          cd downloads
          for FILE in *; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Splitting: $FILE ($(( SIZE / 1024 / 1024 ))MB)"
              split -b 90M "$FILE" "${FILE}.part_"
              rm -f "$FILE"
              echo "Parts: $(ls "${FILE}.part_"* 2>/dev/null | wc -l)"
            fi
          done

      - name: Commit & Push
        run: |
          SIZE=$(cat /tmp/archive_size.txt 2>/dev/null || echo 0)
          cd downloads
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BATCH_SIZE=10

          if [ "$SIZE" -eq 0 ]; then
            echo "No archive, committing individual files in batches"
            mapfile -d '' FILE_LIST < <(find . -type f -not -path './.git/*' 2>/dev/null | head -1000 | tr '\n' '\0')
            TOTAL=${#FILE_LIST[@]}
            if [ "$TOTAL" -eq 0 ]; then
              git add -f .
              git commit --allow-empty -m "Download: $(date +%Y%m%d_%H%M%S) single file [skip ci]" || true
            else
              for ((batch=0; batch<TOTAL; batch+=BATCH_SIZE)); do
                BATCH_NUM=$((batch / BATCH_SIZE + 1))
                BATCH_LIST=("${FILE_LIST[@]:batch:BATCH_SIZE}")
                git add -f "${BATCH_LIST[@]}"
                git commit --no-verify -m "Download: $(date +%Y%m%d_%H%M%S) batch $BATCH_NUM/$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE )) [skip ci]" || true
                git push origin HEAD:${{ github.ref_name }} --force
                echo "✓ Pushed batch $BATCH_NUM/$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE )) ($BATCH_SIZE files) to ${{ github.repository }}"
              done
            fi

          elif [ "$SIZE" -lt $((4 * 1024 * 1024 * 1024)) ]; then
            echo "Archive <4GB ($(( SIZE / 1024 / 1024 ))MB), committing to current repo"

            PART_LIST=( *.part_* )
            if [ ${#PART_LIST[@]} -eq 0 ]; then
              PART_LIST=( *.tar.gz )
            fi

            TOTAL=${#PART_LIST[@]}
            if [ "$TOTAL" -eq 0 ]; then
              echo "No files to commit"
              exit 0
            fi

            for ((batch=0; batch<TOTAL; batch+=BATCH_SIZE)); do
              BATCH_NUM=$((batch / BATCH_SIZE + 1))
              BATCH_LIST=("${PART_LIST[@]:batch:BATCH_SIZE}")
              git add -f "${BATCH_LIST[@]}"
              git commit --no-verify -m "Download: $(date +%Y%m%d_%H%M%S) batch $BATCH_NUM/$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE )) [skip ci]" || true
              git push origin HEAD:${{ github.ref_name }} --force
              echo "✓ Pushed batch $BATCH_NUM/$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE )) to ${{ github.repository }}"
            done

          else
            echo "File >=4GB ($(( SIZE / 1024 / 1024 / 1024 ))GB), using large files pipeline"
            cd downloads

            PART_COUNT=0
            for _p in *.part_*; do
              [ -f "$_p" ] && PART_COUNT=$((PART_COUNT + 1))
            done
            if [ "$PART_COUNT" -eq 0 ]; then
              for _p in *.tar.gz; do
                [ -f "$_p" ] && PART_COUNT=$((PART_COUNT + 1))
              done
            fi
            if [ "$PART_COUNT" -eq 0 ]; then
              echo "No files to push"
              exit 0
            fi

            REPOS_NEEDED=$(( (PART_COUNT + 50 - 1) / 50 ))
            BATCH_SIZE=10

            REPO_BASE="${{ github.repository }}"
            OWNER="${REPO_BASE%/*}"

            push_repo() {
              local REPO_NUM=$1
              local REPO_NAME="large-files-part-$REPO_NUM"
              mkdir -p "../$REPO_NAME"

              START=$(( (REPO_NUM - 1) * 50 ))
              FILE_LIST=()
              for _p in *.part_*; do
                [ -f "$_p" ] || continue
                FILE_LIST+=("$_p")
              done
              _idx=0
              for _p in "${FILE_LIST[@]}"; do
                _idx=$(( _idx + 1 ))
                [ "$_idx" -gt "$START" ] || continue
                [ "$_idx" -gt "$((START + 50))" ] && break
                cpx "$_p" "../$REPO_NAME/" 2>/dev/null || true
              done

              cd "../$REPO_NAME"
              git init

              ALL_FILES=()
              for _a in *.part_*; do
                [ -f "$_a" ] || continue
                ALL_FILES+=("$_a")
              done
              TOTAL_FILES=${#ALL_FILES[@]}

              for ((i=0; i<TOTAL_FILES; i+=BATCH_SIZE)); do
                BATCH_NUM=$((i / BATCH_SIZE + 1))

                for ((j=i; j<i+BATCH_SIZE && j<TOTAL_FILES; j++)); do
                  [ -f "${ALL_FILES[$j]}" ] && git add -f "${ALL_FILES[$j]}"
                done

                git commit -m "Batch $BATCH_NUM [skip ci]" 2>/dev/null || true
                git remote add origin "https://x-access-token:${{ secrets.CROSS_REPO_PAT }}@github.com/$OWNER/$REPO_NAME.git" 2>/dev/null || true
                git push origin HEAD:main --force
                echo "✓ Pushed batch $BATCH_NUM ($BATCH_SIZE files) to $REPO_NAME"
              done
            }

            for REPO_NUM in $(seq 1 $REPOS_NEEDED); do
              push_repo $REPO_NUM &
            done
            wait

            echo "✅ Distributed to $OWNER/large-files-part-{1..$REPOS_NEEDED}"
          fi
