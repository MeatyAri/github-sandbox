name: Download from Commit & Save to Repo
on:
  push:
    branches:
      - "**"
jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3 python3-pip python3-requests ffmpeg curl pigz zstd
          curl -sL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux -o /usr/local/bin/yt-dlp
          chmod +x /usr/local/bin/yt-dlp
          curl -sL https://github.com/amirrezaDev1378/ollama-model-direct-download/releases/download/v2.1.1/omdd-linux-amd64 -o /usr/local/bin/omdd
          chmod +x /usr/local/bin/omdd

      - name: Install bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          echo "BUN_INSTALL_DIR=$HOME/.bun" >> $GITHUB_ENV

      - name: Setup YouTube cookies
        if: success()
        run: |
          echo '${{ secrets.YOUTUBE_COOKIES }}' > youtube_cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Setup Twitch cookies
        if: success()
        run: |
          echo '${{ secrets.TWITCH_COOKIES }}' > twitch_cookies.txt
        env:
          TWITCH_COOKIES: ${{ secrets.TWITCH_COOKIES }}

      - name: Setup Reddit cookies
        if: success()
        run: |
          echo '${{ secrets.REDDIT_COOKIES }}' > reddit_cookies.txt
        env:
          REDDIT_COOKIES: ${{ secrets.REDDIT_COOKIES }}

      - name: Setup SoundCloud cookies
        if: success()
        run: |
          echo '${{ secrets.SOUNDCLOUD_COOKIES }}' > soundcloud_cookies.txt
        env:
          SOUNDCLOUD_COOKIES: ${{ secrets.SOUNDCLOUD_COOKIES }}

      - name: Setup scripts
        run: |
          mkdir -p scripts
          cp -r ${{ github.server_url }}/${{ github.repository }}/scripts scripts/ || true

      - name: Extract URLs and download files
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'ollama:'; then
            MODE="ollama"
            OLLAMA_MODEL=$(echo "$MSG" | grep -oP 'ollama:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          if [ "$MODE" = "ollama" ]; then
            echo "Getting Ollama direct links: $OLLAMA_MODEL"
            omdd get $OLLAMA_MODEL > /tmp/ollama_output.txt
            python3 scripts/extract_ollama_links.py /tmp/ollama_output.txt > /tmp/ollama_links.txt
            echo "=== DEBUG: Links file contents ==="
            cat /tmp/ollama_links.txt
            echo "=== DEBUG: Line count ==="
            wc -l /tmp/ollama_links.txt

            while IFS= read -r LINE || [ -n "$LINE" ]; do
              echo "DEBUG: Read line: [$LINE]"
              URL=$(echo "$LINE" | grep -oP 'https://\S+' | head -1)
              [[ -z "$URL" ]] && { echo "Skipping - no URL found"; continue; }
              FILENAME=$(basename "$URL")
              echo "Downloading: $URL -> $FILENAME"
              aria2c \
                --console-log-level=notice \
                --summary-interval=10 \
                --dir="tmp_downloads" \
                --out "$FILENAME" \
                --header="Accept: application/vnd.docker.distribution.manifest.v2+json" \
                "$URL"
              EXIT_CODE=$?
              if [ $EXIT_CODE -ne 0 ]; then
                echo "aria2c failed with code $EXIT_CODE"
                ls -la tmp_downloads/
                exit 1
              fi
            done < /tmp/ollama_links.txt
            ls -la tmp_downloads/

            ARCHIVE_NAME="/tmp/archive_$(date +%Y%m%d_%H%M%S).tar.gz"
            tar -cvf - -C tmp_downloads . | pigz -k > "$ARCHIVE_NAME"
            cp "$ARCHIVE_NAME" "downloads/"
            rm -f "$ARCHIVE_NAME"

            ARCHIVE_BASENAME=$(basename "$ARCHIVE_NAME")
            ARCHIVE_SIZE=$(stat -c%s "downloads/$ARCHIVE_BASENAME")
            LIMIT=$((90 * 1024 * 1024))

            if [ "$ARCHIVE_SIZE" -gt "$LIMIT" ]; then
              echo "Splitting: $ARCHIVE_BASENAME ($(( ARCHIVE_SIZE / 1024 / 1024 ))MB)"
              split -b 90M "downloads/$ARCHIVE_BASENAME" "downloads/${ARCHIVE_BASENAME}.part_"
              rm -f "downloads/$ARCHIVE_BASENAME"
              echo "Parts: $(ls "downloads/${ARCHIVE_BASENAME}.part_"* 2>/dev/null | wc -l)"
            fi

            rm -rf tmp_downloads
            echo "Zipped archive saved to downloads"
            exit 0
          else
          for URL in $URL_LINE; do
            echo "Processing: $URL"

            if echo "$URL" | grep -qE "(bunkr\.si|bunkr\.fi|bunkr\.ru|bunkr\.cr|bunkr\.rip|bunkrr\.su)"; then
              echo "Downloading Bunkr: $URL"
              python3 scripts/bunkr.py "$URL" "tmp_downloads"

            elif echo "$URL" | grep -qE "youtube\.com|youtu\.be"; then
              echo "Downloading YouTube: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies youtube_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "twitch\.tv"; then
              echo "Downloading Twitch: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies twitch_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "reddit\.com"; then
              echo "Downloading Reddit: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies reddit_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "soundcloud"; then
              echo "Downloading SoundCloud: $URL"
              yt-dlp -q --no-warnings --js-runtimes bun:/home/runner/.bun/bin --cookies soundcloud_cookies.txt -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "pexels"; then
              echo "Downloading Pexels: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "podcasts\.apple\.com"; then
              echo "Downloading Apple Podcasts: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            elif echo "$URL" | grep -qE "rumble\.com|odysee\.com|bitchute\.com|bandcamp\.com"; then
              echo "Downloading video platform: $URL"
              yt-dlp -q --no-warnings -o "tmp_downloads/%(title)s.%(ext)s" "$URL"

            else
              echo "Downloading with aria2: $URL"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --summary-interval=2 \
                --dir="tmp_downloads" \
                "$URL"
            fi
          done
          fi

          FILE_COUNT=$(find tmp_downloads -type f 2>/dev/null | wc -l)
          echo "Downloaded $FILE_COUNT files to tmp_downloads"
          if [ "$FILE_COUNT" -eq 0 ] && [ "$MODE" != "zip" ]; then
            echo "ERROR: No files downloaded"
            ls -la tmp_downloads/
            exit 1
          fi

          if [ "$MODE" = "zip" ]; then
              ARCHIVE_NAME="/tmp/archive_$(date +%Y%m%d_%H%M%S).tar.gz"
              tar -cvf - -C tmp_downloads . | pigz -k > "$ARCHIVE_NAME"
              cp "$ARCHIVE_NAME" "downloads/"
              rm -f "$ARCHIVE_NAME"

              ARCHIVE_BASENAME=$(basename "$ARCHIVE_NAME")
              ARCHIVE_SIZE=$(stat -c%s "downloads/$ARCHIVE_BASENAME")
              LIMIT=$((90 * 1024 * 1024))

              if [ "$ARCHIVE_SIZE" -gt "$LIMIT" ]; then
                echo "Splitting: $ARCHIVE_BASENAME ($(( ARCHIVE_SIZE / 1024 / 1024 ))MB)"
                split -b 90M "downloads/$ARCHIVE_BASENAME" "downloads/${ARCHIVE_BASENAME}.part_"
                rm -f "downloads/$ARCHIVE_BASENAME"
                echo "Parts: $(ls "downloads/${ARCHIVE_BASENAME}.part_"* 2>/dev/null | wc -l)"
              fi

              rm -rf tmp_downloads
              echo "Zipped archive saved to downloads"
              exit 0
          fi

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Splitting: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"
              split -b 90M "$FILE" "downloads/${BASENAME}.part_"
              echo "Parts: $(ls "downloads/${BASENAME}.part_"* 2>/dev/null | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push in batches
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          TOTAL_SIZE=$(du -sb downloads | cut -f1)
          SIZE_GB=$((TOTAL_SIZE / 1024 / 1024 / 1024))
          echo "Total download size: ${SIZE_GB}GB"

          REPO_BASE="${{ github.repository }}"
          OWNER="${REPO_BASE%/*}"

          distribute_to_repos() {
            cd downloads
            FILE_LIST=$(ls -1)
            COUNT=0

            for FILE in $FILE_LIST; do
              PART_NUM=$(( (COUNT % 3) + 1 ))
              REPO_NAME="large-files-part-${PART_NUM}"
              TARGET_DIR="../$REPO_NAME"

              mkdir -p "$TARGET_DIR"
              echo "=== DEBUG: Copying $FILE to $TARGET_DIR/"
              cp "$FILE" "$TARGET_DIR/" || { echo "Failed to copy $FILE"; continue; }
              ls -la "$TARGET_DIR/"

              cd "$TARGET_DIR"
              git init 2>/dev/null || true
              git config user.name "github-actions"
              git config user.email "github-actions@github.com"
              git add -f .
              echo "=== DEBUG: Committing $FILE ==="
              git commit -m "Add $FILE [skip ci]"
              echo "=== DEBUG: Commit result: exit code $? ==="

              if [ -d .git ]; then
                git remote -v 2>/dev/null | grep -q origin || \
                  git remote add origin "https://x-access-token:${{ secrets.CROSS_REPO_PAT }}@github.com/$OWNER/$REPO_NAME.git"
                echo "=== DEBUG: Pushing to $REPO_NAME ==="
                git push origin HEAD:main --force
              fi

              cd ../..
              COUNT=$((COUNT + 1))
            done

            echo "✅ Distributed to $OWNER/large-files-part-{1,2,3}"
          }

          if [ "$SIZE_GB" -ge 4 ]; then
            distribute_to_repos
            exit 0
          fi

          FILE_COUNT=$(find downloads -type f | wc -l)
          echo "Total files to push: $FILE_COUNT"

          BATCH_SIZE=10
          BATCH_NUM=0
          CURRENT_BATCH=1
          TOTAL_BATCHES=$(((FILE_COUNT + BATCH_SIZE - 1) / BATCH_SIZE))

          > /tmp/batch_files.txt

          find downloads -type f -print0 | sort -z | while IFS= read -r -d '' FILE; do
            BATCH_NUM=$((BATCH_NUM + 1))
            printf '%s\0' "$FILE" >> /tmp/batch_files.txt

            if [ $((BATCH_NUM % BATCH_SIZE)) -eq 0 ] || [ $BATCH_NUM -eq "$FILE_COUNT" ]; then
              xargs -0 git add -f < /tmp/batch_files.txt
              git commit -m "Add downloaded files (batch $CURRENT_BATCH/$TOTAL_BATCHES) [skip ci]" || echo "Nothing to commit"
              echo "Pushing batch $CURRENT_BATCH/$TOTAL_BATCHES..."
              git push origin HEAD:$BRANCH || true

              CURRENT_BATCH=$((CURRENT_BATCH + 1))
              > /tmp/batch_files.txt
            fi
          done
